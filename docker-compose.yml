services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      # Allow only the Docker API paths central-deploy actually calls:
      # containers (list/inspect/start/stop/restart/remove/create/logs)
      # images (pull)
      CONTAINERS: "1"
      POST: "1"     # required to allow any POST method
      DELETE: "1"   # required for container removal during deploy
      IMAGES: "1"   # required for image pull
      BUILD: "1"    # required for the "Reclaim build cache" button (POST /build/prune)
      NETWORKS: "1" # required by the self-update watchtower: it recreates the
                    # central-deploy container and re-attaches its networks via
                    # POST /networks/{id}/connect (403 without this scope)
      # Everything else OFF:
      AUTH: "0"
      COMMIT: "0"
      CONFIGS: "0"
      DISTRIBUTION: "0"
      EXEC: "0"
      NODES: "0"
      PLUGINS: "0"
      SECRETS: "0"
      SERVICES: "0"
      SESSION: "0"
      SWARM: "0"
      SYSTEM: "1"   # enables /system/df for Docker disk-usage reporting
      TASKS: "0"
      VOLUMES: "1"   # required for named-volume create/list/inspect/remove
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # TCP port 2375 is NOT bound to the host; only reachable within this compose network
    networks:
      - internal

  central-deploy:
    # Published by .github/workflows/release.yml on every push to main;
    # `docker compose pull` updates it. `build: .` remains for local dev
    # (`docker compose up --build`).
    image: ghcr.io/damien-robotsix/robotsix-central-deploy:main
    build: .
    restart: unless-stopped
    environment:
      # Since the robotsix_config migration, ROBOTSIX_LIFECYCLE_* env vars are
      # dead — ALL config values live in one JSON file. This var only locates
      # it. Seed /data/config.json before first start (see docs/deployment.md);
      # without it the baked-in config/config.json defaults apply (unix docker
      # socket, in-memory store) and the server cannot reach the socket proxy.
      ROBOTSIX_CONFIG_FILE: "/data/config.json"
    volumes:
      - central_deploy_data:/data
      - /:/host_root:ro      # exposes host filesystem at /host_root (read-only)
    ports:
      - "127.0.0.1:8100:8100"
    depends_on:
      - socket-proxy
    networks:
      - internal
      - central-deploy-proxy

volumes:
  central_deploy_data:

networks:
  internal:
    driver: bridge
  central-deploy-proxy:
    driver: bridge
    name: central-deploy-proxy
