# Component registry — single source of truth for the Docker-API deployment manager.
# All components run on server.robotsix.net against the local Docker socket.
# Single-host only; no remote Docker endpoints.
#
# STUB VALUES: image tags, ports, mounts, and env are placeholders.
# Confirm each with the operator before onboarding a live service.

components:
  - id: cost-monitor
    image: ghcr.io/robotsix/cost-monitor:latest  # TODO: confirm tag
    container_name: cost-monitor
    ports:
      - host: 8200   # TODO: confirm host port
        container: 8200
    mounts: []
    env: {}          # TODO: add any required env vars
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 15

  - id: calendar-agent
    image: ghcr.io/damien-robotsix/robotsix-calendar-agent:main
    container_name: calendar-agent
    ports:
      - host: 8201
        container: 8080
    mounts: []
    env:
      CALENDAR_AGENT_TRANSPORT: brokered
      CALENDAR_AGENT_ID: robotsix-calendar
      BROKER_HOST: ai-broker.robotsix.net
      BROKER_PORT: "443"
      BROKER_SCHEME: https
      BROKER_AGENT_TOKEN: ""
      RADICALE_URL: http://radicale:5232
      RADICALE_USERNAME: ""
      RADICALE_PASSWORD: ""
    health_check:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 30

  - id: auto-mail
    image: ghcr.io/robotsix/auto-mail:latest  # TODO: confirm tag
    container_name: auto-mail
    ports:
      - host: 8202   # TODO: confirm host port
        container: 8080
    mounts: []
    env: {}          # TODO: add any required env vars
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 15

  - id: chat
    image: ghcr.io/robotsix/chat:latest  # TODO: confirm tag
    container_name: chat
    ports:
      - host: 3000   # TODO: confirm host port
        container: 3000
    mounts: []
    env: {}          # TODO: add any required env vars
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 20

  - id: broker
    # Also known as agent-comm; the inter-agent communication broker.
    image: ghcr.io/robotsix/agent-comm:latest  # TODO: confirm image name and tag
    container_name: agent-comm
    ports:
      - host: 8300   # TODO: confirm host port
        container: 8080
    mounts: []
    env: {}          # TODO: add any required env vars
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 15

  - id: radicale
    image: tomsquest/docker-radicale:latest
    container_name: radicale
    stateful_volumes:
      - radicale-data
    ports:
      - host: 5232
        container: 5232
    mounts:
      - host: radicale-data
        container: /data
        read_only: false
    env: {}
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:5232/"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 10
