# config/components.yaml — seed baseline for ComponentRegistry.
# This file is the static declaration; onboarding adds dynamic entries.
components:
  - id: cost-monitor
    image: ghcr.io/damien-robotsix/cost-monitor:main
    container_name: cost-monitor
    ports:
      - host: 8200
        container: 8200
    mounts:
      - host: cost-data
        container: /data
    env:
      OPENAI_API_KEY: ""
      DATABASE_URL: ""
      DEBUG: "false"
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 15
    claude_mount: true
    named_volumes:
      - cost-data
    stateful_volumes:
      - cost-data

  - id: calendar-agent
    image: ghcr.io/damien-robotsix/calendar-agent:main
    container_name: calendar-agent
    ports:
      - host: 8201
        container: 8201
    env:
      CALDAV_URL: ""
      ANTHROPIC_API_KEY: ""
      DATABASE_URL: ""
    health_check:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 15

  - id: auto-mail
    image: ghcr.io/damien-robotsix/auto-mail:main
    container_name: auto-mail
    ports:
      - host: 8202
        container: 8080
    env:
      SMTP_HOST: ""
      AUTH_TOKEN: ""
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 15
    named_volumes:
      - mail-spool
    stateful_volumes:
      - mail-spool
    siblings:
      - service_key: ingester
        container_name: auto-mail-ingester
        image: ghcr.io/damien-robotsix/auto-mail-ingester:main
        mounts:
          - host: mail-spool
            container: /data
        env:
          BOARD_URL: ""
          IMAP_PASSWORD: ""

  - id: chat
    image: ghcr.io/damien-robotsix/chat:main
    container_name: chat
    ports:
      - host: 3000
        container: 3000
    mounts:
      - host: chat-data
        container: /app/data
    env:
      ANTHROPIC_API_KEY: ""
      AUTH_SECRET: ""
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval_seconds: 30
      timeout_seconds: 10
      retries: 3
      start_period_seconds: 20
    claude_mount: true
    named_volumes:
      - chat-data
    stateful_volumes:
      - chat-data

  - id: agent-comm
    image: ghcr.io/damien-robotsix/agent-comm:main
    container_name: agent-comm
    ports:
      - host: 8300
        container: 8300
    env:
      AUTH_TOKEN: ""

  - id: radicale
    image: tomsquest/docker-radicale:3.3.0.0
    container_name: radicale
    ports:
      - host: 5232
        container: 5232
    mounts:
      - host: radicale-data
        container: /data
    env:
      TZ: UTC
    named_volumes:
      - radicale-data
    stateful_volumes:
      - radicale-data
