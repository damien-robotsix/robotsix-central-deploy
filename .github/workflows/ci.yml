name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs-dedup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Verify DEPLOY_CONTRACT.md is a symlink (not a stale copy)
        run: |
          set -euo pipefail
          if [ ! -L src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md ]; then
            echo "::error::src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md must be a symlink to the canonical copy"
            exit 1
          fi
      - name: Verify DEPLOY_CONTRACT.md symlink target is correct
        run: |
          set -euo pipefail
          target=$(readlink src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md)
          expected="../../../docs/ui/DEPLOY_CONTRACT.md"
          if [ "$target" != "$expected" ]; then
            echo "::error::src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md symlink target is '$target', expected '$expected'"
            exit 1
          fi
      - name: Verify symlink resolves and content matches
        run: |
          set -euo pipefail
          diff docs/ui/DEPLOY_CONTRACT.md src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md

  tests:
    # Inlined from the reusable python-ci.yml to avoid astral-sh/setup-uv
    # manifest-fetch timeouts (the action fetches raw.githubusercontent.com
    # and sometimes hits a 5-second Node.js fetch timeout in CI).  Using
    # `pip install uv` instead — no manifest fetch, no timeout risk.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dev deps
        run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: system

      - name: deptry (dependency hygiene)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run --with deptry deptry .

      - name: Dependency audit (CVE scan)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          if uv audit --help >/dev/null 2>&1; then
            uv audit --frozen --preview
          else
            uv export --frozen --no-hashes | grep -v '^-e \.' | uv run --with pip-audit pip-audit -r /dev/stdin
          fi

      - name: Ruff (lint + format check)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check --diff .

      - name: Mypy (static type check)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run mypy src/ --strict

      - name: Bandit (security SAST)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run --with 'bandit[toml]' bandit -c pyproject.toml -r src/ --severity-level medium

      - name: Run tests
        env:
          UV_PROJECT_ENVIRONMENT: system
          GIT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
        run: |
          uv run --with pytest-xdist --with pytest-cov pytest tests/ -n auto --dist loadscope -x --tb=long --cov="robotsix_central_deploy" --cov-fail-under="80" --cov-report=term-missing

  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Audit dependencies
        run: uv audit --frozen

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENT: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: robotsix-central-deploy:ci
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: robotsix-central-deploy:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  grep-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Flag raw health/state/backend strings outside enum definition
        run: |
          set -euo pipefail
          violations=0
          # Health strings (exclude models.py where the enum lives)
          for pattern in '"healthy"' '"unhealthy"' '"starting"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw health string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          # Update-state strings (exclude models.py)
          for pattern in '"up-to-date"' '"update-available"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw update-state string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          # Store-backend strings (exclude models.py and conftest)
          for pattern in '"memory"' '"file"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw store-backend string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          # Execution-backend strings (exclude models.py where the enum lives,
          # and backend.py/noop.py where "docker"/"noop" references the CLI
          # binary or credential values, not the backend type)
          for pattern in '"docker_sdk"' '"docker"' '"noop"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' --exclude='backend.py' --exclude='noop.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw execution-backend string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "::error::Found $violations violation(s) of enum-only string policy"
            exit 1
          fi
          echo "All grep-lint checks passed."

  lint-actions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Run actionlint
        run: '"$(go env GOPATH)/bin/actionlint"'
      - name: Install uv
        run: pip install uv
      - name: Run zizmor
        run: uv tool run --from zizmor zizmor .github/workflows/

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          languages: python
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4

  module-taxonomy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Validate module taxonomy
        run: uv run robotsix-modules-validate docs/modules.yaml

  config-schema-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Check config/config.schema.json drift
        run: |
          uv run python - <<'EOF'
          from robotsix_central_deploy.lifecycle.config import LifecycleConfig
          import robotsix_config, pathlib, sys
          generated = robotsix_config.config_schema_json(LifecycleConfig)
          committed = pathlib.Path("config/config.schema.json").read_text()
          if generated.strip() != committed.strip():
              print("config/config.schema.json is stale. Regenerate with:")
              print("  uv run python -c \"from robotsix_central_deploy.lifecycle.config import LifecycleConfig; import robotsix_config; print(robotsix_config.config_schema_json(LifecycleConfig))\" > config/config.schema.json")
              sys.exit(1)
          EOF

  dependency-review:
    # dependency-review-action diffs base..head and only supports
    # pull_request events; on push to main it fails unconditionally.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high
