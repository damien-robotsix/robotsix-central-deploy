name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs-dedup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Verify DEPLOY_CONTRACT.md is a symlink (not a stale copy)
        run: |
          set -euo pipefail
          if [ ! -L src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md ]; then
            echo "::error::src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md must be a symlink to the canonical copy"
            exit 1
          fi
      - name: Verify DEPLOY_CONTRACT.md symlink target is correct
        run: |
          set -euo pipefail
          target=$(readlink src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md)
          expected="../../../docs/ui/DEPLOY_CONTRACT.md"
          if [ "$target" != "$expected" ]; then
            echo "::error::src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md symlink target is '$target', expected '$expected'"
            exit 1
          fi
      - name: Verify symlink resolves and content matches
        run: |
          set -euo pipefail
          diff docs/ui/DEPLOY_CONTRACT.md src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md

  tests:
    # Inlined from the reusable python-ci.yml to avoid astral-sh/setup-uv
    # manifest-fetch timeouts (the action fetches raw.githubusercontent.com
    # and sometimes hits a 5-second Node.js fetch timeout in CI).  Using
    # `pip install uv` instead — no manifest fetch, no timeout risk.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dev deps
        run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: system

      - name: Check changelog fragment
        if: github.event_name == 'pull_request'
        env:
          UV_PROJECT_ENVIRONMENT: system
          BASE_REF: ${{ github.base_ref }}
        run: uv run towncrier check --compare-with origin/$BASE_REF

      - name: deptry (dependency hygiene)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run --with deptry deptry .

      - name: Dependency audit (CVE scan)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          if uv audit --help >/dev/null 2>&1; then
            uv audit --frozen --preview
          else
            uv export --frozen --no-hashes | grep -v '^-e \.' | uv run --with pip-audit pip-audit -r /dev/stdin
          fi

      - name: Ruff (lint + format check)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check --diff .

      - name: Mypy (static type check)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run mypy src/ --strict

      - name: Bandit (security SAST)
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run --with 'bandit[toml]' bandit -c pyproject.toml -r src/ --severity-level medium

      - name: Run tests
        env:
          UV_PROJECT_ENVIRONMENT: system
          GIT_BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
        run: |
          uv run --with pytest-xdist --with pytest-cov pytest tests/ -n auto --dist loadscope -x --tb=long --cov="robotsix_central_deploy" --cov-fail-under="80" --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Audit dependencies
        run: uv audit --frozen

  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: TruffleHog secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            trufflesecurity/trufflehog:3.95.9 \
            git file:///repo --only-verified --fail

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: robotsix-central-deploy:ci
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: robotsix-central-deploy:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        if: always()
        with:
          sarif_file: trivy-results.sarif

  hadolint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  grep-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Install TruffleHog
        run: |
          TRUFFLEHOG_VERSION=3.95.9
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin trufflehog
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Flag raw health/state/backend strings outside enum definition
        run: |
          set -euo pipefail
          violations=0
          # Health strings (exclude models.py where the enum lives)
          for pattern in '"healthy"' '"unhealthy"' '"starting"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw health string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          # Update-state strings (exclude models.py)
          for pattern in '"up-to-date"' '"update-available"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw update-state string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          # Store-backend strings (exclude models.py and conftest)
          for pattern in '"memory"' '"file"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw store-backend string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          # Execution-backend strings (exclude models.py where the enum lives,
          # and backend.py/noop.py/chat_preview.py/docker_cli.py where
          # "docker"/"noop" references the CLI binary or credential values,
          # not the backend type)
          for pattern in '"docker_sdk"' '"docker"' '"noop"'; do
            matches=$(grep -rn "$pattern" src/robotsix_central_deploy/lifecycle/ --include='*.py' \
              --exclude='models.py' --exclude='backend.py' --exclude='noop.py' --exclude='chat_preview.py' --exclude='docker_cli.py' || true)
            if [ -n "$matches" ]; then
              echo "::error file={},line={}::Raw execution-backend string $pattern found outside models.py"
              echo "$matches"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "::error::Found $violations violation(s) of enum-only string policy"
            exit 1
          fi
          echo "All grep-lint checks passed."

  lint-actions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Run actionlint
        run: '"$(go env GOPATH)/bin/actionlint"'
      - name: Install uv
        run: pip install uv
      - name: Run zizmor
        run: uv tool run --from zizmor zizmor .github/workflows/

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: python
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1

  module-taxonomy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Validate module taxonomy
        run: uv run robotsix-modules-validate docs/modules.yaml

  config-schema-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Check config/config.schema.json drift
        run: |
          uv run python - <<'EOF'
          from robotsix_central_deploy.lifecycle.config import LifecycleConfig
          import robotsix_config, pathlib, sys
          generated = robotsix_config.config_schema_json(LifecycleConfig)
          committed = pathlib.Path("config/config.schema.json").read_text()
          if generated.strip() != committed.strip():
              print("config/config.schema.json is stale. Regenerate with:")
              print("  uv run python -c \"from robotsix_central_deploy.lifecycle.config import LifecycleConfig; import robotsix_config; print(robotsix_config.config_schema_json(LifecycleConfig))\" > config/config.schema.json")
              sys.exit(1)
          EOF

  openapi-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "22"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Regenerate OpenAPI spec
        run: uv run python _gen_openapi.py
      - name: Check for OpenAPI drift
        run: |
          if ! git diff --exit-code docs/lifecycle/openapi.json; then
            echo "::error::docs/lifecycle/openapi.json is stale. Regenerate with:"
            echo "  uv run python _gen_openapi.py"
            exit 1
          fi
      - name: Lint OpenAPI spec with Redocly
        run: npx --yes @redocly/cli@1.27.0 lint docs/lifecycle/openapi.json

  dependency-review:
    # dependency-review-action diffs base..head and only supports
    # pull_request events; on push to main it fails unconditionally.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v4
        with:
          fail-on-severity: high

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Generate CycloneDX SBOM
        run: |
          uv tool run --from 'cyclonedx-bom>=4.0' cyclonedx-py environment \
            --output-file sbom.cyclonedx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json
