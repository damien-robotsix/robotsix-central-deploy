name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@b65aa6fcec7fc76e5a565c70e630623a91204f86  # main
    with:
      python-version: "3.14"
      cov-package: "robotsix_central_deploy"
      coverage-threshold: "80"
      mypy-advisory: true
    secrets: inherit
