name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  docs-dedup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Verify DEPLOY_CONTRACT.md is a symlink (not a stale copy)
        run: |
          set -euo pipefail
          if [ ! -L docs/DEPLOY_CONTRACT.md ]; then
            echo "::error::docs/DEPLOY_CONTRACT.md must be a symlink to the canonical copy"
            exit 1
          fi
      - name: Verify DEPLOY_CONTRACT.md symlink target is correct
        run: |
          set -euo pipefail
          target=$(readlink docs/DEPLOY_CONTRACT.md)
          expected="../src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md"
          if [ "$target" != "$expected" ]; then
            echo "::error::docs/DEPLOY_CONTRACT.md symlink target is '$target', expected '$expected'"
            exit 1
          fi
      - name: Verify symlink resolves and content matches
        run: |
          set -euo pipefail
          diff docs/DEPLOY_CONTRACT.md src/robotsix_central_deploy/ui/DEPLOY_CONTRACT.md

  tests:
    # The reusable python-ci.yml's nested `tests` job uploads SARIF, so it
    # requests `security-events: write`. A caller job MUST grant at least
    # that, or GitHub rejects the reusable-workflow call with a
    # startup_failure ("nested job 'tests' is requesting …").
    permissions:
      contents: read
      security-events: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      python-version: "3.14"
      # central-deploy declares no `tracing` extra; the reusable defaults
      # install-extras to "tracing", so pin it empty to avoid a failing
      # `uv sync --extra tracing`.
      install-extras: ""
      cov-package: "robotsix_central_deploy"
      coverage-threshold: "80"
      mypy-advisory: false
    secrets: inherit
