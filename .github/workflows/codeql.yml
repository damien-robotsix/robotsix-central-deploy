name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  codeql:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/codeql.yml@7314c9b6c2b536ca81023e8841f272b72733262e
    with:
      languages: python
      queries: security-extended
