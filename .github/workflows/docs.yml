name: Docs
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    permissions:
      pages: write
      id-token: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-docs.yml@4c25a782556a8811d7aeed635b91fd9f790df203  # main
    with:
      docs-install-args: "--group docs"
