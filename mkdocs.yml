site_name: "Robotsix Central Deploy"
site_url: "https://robotsix.net/central-deploy/"
site_description: "Central deployment & lifecycle server for the robotsix suite"
repo_url: "https://github.com/damien-robotsix/robotsix-central-deploy"

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  language: en

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            filters:
              - "!^_"
              - "^__init__$"
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Deployment: deployment.md
  - Architecture: ARCHITECTURE.md
  - Configuration: lifecycle/configuration.md
  - API Reference: lifecycle/api.md
  - Modules:
      - Gateway: gateway/overview.md
      - Onboarding: onboard/overview.md
      - Registry: registry/overview.md
      - Registry Check: registry_check/overview.md
      - Caretaker: caretaker/overview.md
  - Deploy Contract: ui/DEPLOY_CONTRACT.md
  - Changelog: changelog.md
