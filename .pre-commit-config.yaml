repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
        exclude: '^docs/openapi\.json$'
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false

      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data (verified only).
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --only-verified --fail'
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: robotsix-modules-validate
        name: Module taxonomy validation
        entry: uv run robotsix-modules-validate docs/modules.yaml
        language: system
        types: [yaml]
        files: ^docs/modules\.yaml$
        pass_filenames: false
