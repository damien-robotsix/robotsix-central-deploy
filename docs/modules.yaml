# robotsix-central-deploy modules
package: robotsix_central_deploy

modules:
  - id: lifecycle
    description: >
      Lifecycle control API for the robotsix suite — start, stop, restart,
      and inspect the status of managed services.
    dependencies: []
    paths:
      - src/robotsix_central_deploy/__init__.py
      - src/robotsix_central_deploy/_yaml_utils.py
      - src/robotsix_central_deploy/deploy_lock.py
      - src/robotsix_central_deploy/lifecycle/**/*
      - tests/lifecycle/**/*
      - tests/conftest.py
      - tests/__init__.py
      - tests/deploy_lock/**/*
      - tests/yaml_utils/**/*
      - docs/ARCHITECTURE.md
      - docs/api.md
      - docs/changelog.md
      - docs/configuration.md
      - docs/deployment.md
      - docs/index.md
      - docs/modules.yaml
      - docs/nginx-deploy.conf
      - docs/openapi.json
      # Root-level repo infrastructure
      - .gitattributes
      - .gitignore
      - .gitleaksignore
      - .pre-commit-config.yaml
      - .secrets.baseline
      - .trivyignore
      - .github/**/*
      - .robotsix-mill/**/*
      - AGENT.md
      - CHANGELOG.md
      - CODE_OF_CONDUCT.md
      - CONTRIBUTING.md
      - Dockerfile
      - LICENSE
      - README.md
      - SECURITY.md
      - _gen_openapi.py
      - _mill_build.py
      - changelog.d/**/*
      - config/**/*
      - docker-compose.yml
      - mkdocs.yml
      - pyproject.toml
      - uv.lock

  - id: gateway
    description: >
      Reverse-proxy gateway — routes <name>.deploy.robotsix.net (Host
      subdomain) to managed container services via HTTP and WebSocket
      proxying. Legacy path URLs (deploy.robotsix.net/<name>/...) redirect
      to the component subdomain.
    dependencies: []
    paths:
      - src/robotsix_central_deploy/gateway/**/*
      - tests/gateway/**/*
      - docs/gateway/**/*

  - id: registry
    description: >
      Component registry — declares each managed Docker component (id, image,
      container name, ports, mounts, env, health check). Initialised empty at
      startup and populated from the dynamic component-config JSON store
      (onboarding adds entries); consumed by the Docker-API backend.
    dependencies: []
    paths:
      - src/robotsix_central_deploy/registry/**/*
      - tests/registry/**/*
      - docs/registry/**/*

  - id: ui
    description: >
      Monitoring dashboard UI — serves a self-contained HTML page at /ui
      showing live component status, image revision, health, start/stop/
      restart controls, and a per-component env/secrets config modal.
      The modal lets operators view, add, edit, and delete environment
      variables and secrets without SSH access, using the
      `GET/PUT/DELETE /services/{name}/env` API endpoints.
      Auth-gated via verify_auth.
    dependencies: []
    paths:
      - src/robotsix_central_deploy/ui/**/*
      - tests/ui/**/*
      - docs/ui/**/*

  - id: registry-check
    description: >
      Registry image-update detection — polls the GHCR registry for the
      latest manifest digest and compares against the deployed image digest
      to determine whether an update is available.
    dependencies: []
    paths:
      - src/robotsix_central_deploy/registry_check/**/*
      - tests/registry_check/**/*
      - docs/registry_check/**/*

  - id: caretaker
    description: >
      Background maintenance agent — runs daily passes over managed components
      for health checks, image-update detection/applying, volume auditing, and
      disk monitoring. Orchestrated by a periodic scheduler; lifecycle exposes
      a /caretaker/status endpoint.
    dependencies: []
    paths:
      - src/robotsix_central_deploy/caretaker/**/*
      - tests/caretaker/**/*
      - docs/caretaker/**/*

  - id: onboard
    description: >
      Onboard-from-git — fetches a service repo's docker-compose.yml via
      shallow git clone and parses it into a DerivedSpec against the
      central-deploy contract (v1).
    dependencies: []
    paths:
      - src/robotsix_central_deploy/onboard/**/*
      - tests/onboard/**/*
      - docs/onboard/**/*

  - id: volume-audit
    description: >
      Docker volume audit subsystem — periodic scanning of managed named
      volumes, growth-over-time tracking with percentile and absolute-delta
      guards, and threshold-breach reporting via a pluggable report seam.
    dependencies: []
    paths:
      - src/robotsix_central_deploy/volume_audit/**/*
      - tests/volume_audit/**/*
      - docs/volume_audit/**/*
