# robotsix-central-deploy modules

modules:
  lifecycle:
    name: lifecycle
    description: >
      Lifecycle control API for the robotsix suite — start, stop, restart,
      and inspect the status of managed services.
    package: robotsix_central_deploy.lifecycle
    entrypoint: robotsix_central_deploy.lifecycle.cli:main
    dependencies:
      - fastapi
      - uvicorn
      - pydantic
      - pydantic-settings
      - pyyaml
    config:
      env_prefix: ROBOTSIX_LIFECYCLE_
      env_example: .env.lifecycle.example
    endpoints:
      - GET /health
      - GET /services
      - GET /services/{name}
      - POST /services/{name}/start
      - POST /services/{name}/stop
      - POST /services/{name}/restart
    docs: /docs
    openapi: /openapi.json
    tests: tests/lifecycle/

  registry:
    name: registry
    description: >
      Component registry — declares each managed Docker component (id, image,
      container name, ports, mounts, env, health check). Loaded from YAML at
      startup; consumed by the Docker-API backend.
    package: robotsix_central_deploy.registry
    dependencies:
      - pydantic
      - pyyaml
    tests: tests/registry/

  ui:
    name: ui
    description: >
      Monitoring dashboard UI — serves a self-contained HTML page at /ui
      showing live component status, image revision, health, start/stop/
      restart controls, and a per-component env/secrets config modal.
      The modal lets operators view, add, edit, and delete environment
      variables and secrets without SSH access, using the
      `GET/PUT/DELETE /services/{name}/env` API endpoints.
      Auth-gated via verify_auth.
    package: robotsix_central_deploy.ui
    dependencies:
      - fastapi
    endpoints:
      - GET /ui
    tests: tests/ui/

  registry_check:
    name: registry_check
    description: >
      Registry image-update detection — polls the GHCR registry for the
      latest manifest digest and compares against the deployed image digest
      to determine whether an update is available.
    package: robotsix_central_deploy.registry_check
    dependencies:
      - httpx
    tests: tests/registry_check/

  onboard:
    name: onboard
    description: >
      Onboard-from-git — fetches a service repo's docker-compose.yml via
      shallow git clone and parses it into a DerivedSpec against the
      central-deploy contract (v1).
    package: robotsix_central_deploy.onboard
    dependencies:
      - pydantic
      - pyyaml
    tests: tests/test_onboard_parser.py tests/test_onboard_api.py tests/test_config_yaml_store.py

  volume_audit:
    name: volume_audit
    description: >
      Docker volume audit subsystem — periodic scanning of managed named
      volumes, growth-over-time tracking with percentile and absolute-delta
      guards, and threshold-breach reporting via a pluggable report seam.
    package: robotsix_central_deploy.volume_audit
    dependencies:
      - pydantic
    config:
      env_prefix: ROBOTSIX_LIFECYCLE_
    endpoints:
      - GET /volumes/audit
    tests: tests/volume_audit/ tests/lifecycle/test_volume_audit_endpoint.py
