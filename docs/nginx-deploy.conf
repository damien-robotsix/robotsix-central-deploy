# nginx reverse-proxy config for deploy.robotsix.net
# =================================================
#
# Installation (run on server.robotsix.net):
#
#   1. Copy this file:
#        cp docs/nginx-deploy.conf /etc/nginx/sites-available/deploy.robotsix.net
#        ln -s /etc/nginx/sites-available/deploy.robotsix.net /etc/nginx/sites-enabled/
#
#   2. Create the htpasswd file (use the same credentials as
#      ROBOTSIX_LIFECYCLE_AUTH_USERNAME / ROBOTSIX_LIFECYCLE_AUTH_PASSWORD):
#        htpasswd -c /etc/nginx/htpasswd/central-deploy <username>
#
#   3. Obtain the Let's Encrypt certificate:
#        certbot --nginx -d deploy.robotsix.net
#
#   4. Test and reload:
#        nginx -t && systemctl reload nginx
#
# NOTE: The basic-auth realm and htpasswd path convention mirror the broker
# dashboard nginx config on server.robotsix.net (same /etc/nginx/htpasswd/
# directory, different file name).

# ------------------------------------------------------------------------
# WebSocket upgrade support (gateway relays WS to managed containers)
# ------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name deploy.robotsix.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------------------------------------------
# HTTPS (TLS)
# ------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name deploy.robotsix.net;

    # Let's Encrypt certificates (standard certbot paths)
    ssl_certificate     /etc/letsencrypt/live/deploy.robotsix.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deploy.robotsix.net/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Proxy settings — buffering off for streaming log responses
    proxy_buffering off;
    proxy_read_timeout 300s;

    # ------------------------------------------------------------------
    # Default: auth-gated proxy to central-deploy
    # ------------------------------------------------------------------
    location / {
        auth_basic "Central Deploy";
        auth_basic_user_file /etc/nginx/htpasswd/central-deploy;

        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (gateway proxies WS to managed containers)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ------------------------------------------------------------------
    # Health probe: always unauthenticated
    # ------------------------------------------------------------------
    location = /health {
        auth_basic off;
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
