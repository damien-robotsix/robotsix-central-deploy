# nginx reverse-proxy reference for deploy.robotsix.net
# ======================================================
#
# ⚠ REFERENCE ONLY. nginx configuration is server-specific and lives on
# server.robotsix.net (/etc/nginx/). This file documents the deployed shape
# so the repo explains how the service is fronted — it is NOT installed,
# templated, or kept in lockstep by any tooling. When in doubt, the live
# server config is authoritative. See deployment.md for the full setup.
#
# Deployed layout on server.robotsix.net:
#   /etc/nginx/conf.d/websocket-upgrade.conf          — WS upgrade map (below)
#   /etc/nginx/sites-available/deploy.robotsix.net    — main dashboard vhost
#   /etc/nginx/sites-available/wildcard.deploy.robotsix.net
#                                                     — catch-all component vhost
#   /etc/nginx/htpasswd/deploy.robotsix.net           — basic-auth credentials
#
# TLS: certbot. The base-domain cert uses the nginx (HTTP-01) authenticator;
# the wildcard cert requires DNS-01 via the certbot-dns-ovh plugin (see
# deployment.md).

# ------------------------------------------------------------------------
# WebSocket upgrade support (http context — /etc/nginx/conf.d/)
# The central-deploy gateway relays WebSocket connections to managed
# containers; without these headers the WS handshake dies at nginx.
# ------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ------------------------------------------------------------------------
# Main vhost — dashboard + path-based gateway (deploy.robotsix.net/<name>/…)
# ------------------------------------------------------------------------
server {
    server_name deploy.robotsix.net;

    # Liveness probe: always unauthenticated
    location = /health {
        proxy_pass http://127.0.0.1:8100/health;
        proxy_set_header Host $host;
    }

    # bare domain -> the dashboard UI
    location = / {
        return 302 /ui;
    }

    location / {
        auth_basic           "Robotsix Central Deploy (admin)";
        auth_basic_user_file /etc/nginx/htpasswd/deploy.robotsix.net;

        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 + upgrade headers: required for gateway WebSocket relay;
        # buffering off + long read timeout for streaming log responses.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/deploy.robotsix.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deploy.robotsix.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    listen 80;
    listen [::]:80;
    server_name deploy.robotsix.net;
    return 301 https://$host$request_uri;
}

# ------------------------------------------------------------------------
# Wildcard vhost — subdomain-based gateway (<name>.deploy.robotsix.net)
# The gateway resolves the component from the Host header, so onboarding a
# new component requires NO nginx change. Explicit server_name vhosts take
# precedence over this wildcard if both are enabled.
# ------------------------------------------------------------------------
server {
    server_name *.deploy.robotsix.net;

    location / {
        auth_basic           "Robotsix Central Deploy (components)";
        auth_basic_user_file /etc/nginx/htpasswd/deploy.robotsix.net;

        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/wildcard.deploy.robotsix.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wildcard.deploy.robotsix.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    listen 80;
    listen [::]:80;
    server_name *.deploy.robotsix.net;
    return 301 https://$host$request_uri;
}
