<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robotsix Deploy — Login</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: #1e293b;
    border-radius: 8px;
    padding: 32px 40px;
    width: 380px;
    max-width: 95vw;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 1.2rem; color: #60a5fa; margin-bottom: 20px;
    text-align: center;
  }
  label {
    display: block; margin-bottom: 14px; font-size: 0.88rem; color: #94a3b8;
  }
  input[type="text"],
  input[type="password"] {
    display: block; width: 100%; margin-top: 4px; padding: 8px 12px;
    background: #0f172a; border: 1px solid #475569; border-radius: 4px;
    color: #e2e8f0; font-size: 0.92rem;
  }
  button {
    width: 100%; padding: 10px 0; margin-top: 20px;
    background: #60a5fa; color: #0f172a;
    border: none; border-radius: 4px; font-size: 0.92rem; font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.85; }
  .error {
    background: rgba(248,113,113,0.15); color: #f87171;
    border: 1px solid #f87171; border-radius: 4px;
    padding: 8px 14px; margin-top: 14px; font-size: 0.85rem;
    display: none;
  }
</style>
</head>
<body>
<div class="login-card">
  <h1>Robotsix Deploy</h1>
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{next}}">
    <input type="hidden" name="csrftoken" value="{{csrf_token}}">
    <label>Username
      <input type="text" name="username" autocomplete="username" required>
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
  <div class="error" id="login-error">{{error}}</div>
</div>
<script>
(function() {
  var el = document.getElementById('login-error');
  if (el && el.textContent.trim()) { el.style.display = 'block'; }
})();
</script>
</body>
</html>
