[project]
name = "robotsix-central-deploy"
version = "0.1.0"
description = "Central deployment & lifecycle server for the robotsix suite"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0",
    "docker>=7.0",
    "cryptography>=41.0",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
    "mypy>=1.0",
    "coverage>=7.0",
    "pytest-cov>=4.0",
    "ruff>=0.1",
]

[project.scripts]
robotsix-lifecycle = "robotsix_central_deploy.lifecycle.cli:main"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.setuptools.package-data]
"robotsix_central_deploy" = ["ui/*.html", "ui/*.md"]

[tool.mypy]
strict = true

[tool.coverage.run]
source = ["src"]
branch = true

[tool.coverage.report]
fail_under = 80

[tool.deptry]
known_first_party = ["robotsix_central_deploy"]
per_rule_ignores = { "DEP002" = ["pytest", "pytest-asyncio", "mypy", "coverage", "pytest-cov", "ruff"], "DEP003" = ["starlette", "requests"] }
